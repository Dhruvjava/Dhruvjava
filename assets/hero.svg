<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00b4d8"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)"/>
  <rect width="900" height="280" fill="url(#grid)"/>

  <!-- Floating particle accent dots -->
  <circle cx="80" cy="50" r="2" fill="#00b4d8" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="80" r="2" fill="#7c3aed" opacity="0.6">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="220" r="2" fill="#22d3ee" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="230" r="2" fill="#00b4d8" opacity="0.6">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Terminal window mockup (right side) -->
  <g transform="translate(540, 50)">
    <rect width="320" height="180" rx="10" fill="#0d1117" stroke="#1e293b" stroke-width="1"/>
    <rect width="320" height="28" rx="10" fill="#161b22"/>
    <rect y="20" width="320" height="8" fill="#161b22"/>
    <circle cx="14" cy="14" r="5" fill="#ff5f57"/>
    <circle cx="32" cy="14" r="5" fill="#febc2e"/>
    <circle cx="50" cy="14" r="5" fill="#28c840"/>
    <text x="160" y="18" font-family="monospace" font-size="10" fill="#6b7280" text-anchor="middle">dhruv@backend ~ %</text>

    <!-- Terminal lines (typed effect via opacity stagger) -->
    <g font-family="monospace" font-size="11">
      <text x="14" y="56" fill="#22d3ee">$ whoami</text>
      <text x="14" y="74" fill="#e5e7eb">dhruv_kumar // java_backend_dev</text>

      <text x="14" y="98" fill="#22d3ee">$ cat stack.json</text>
      <text x="14" y="116" fill="#94a3b8">{ </text>
      <text x="28" y="132" fill="#fbbf24">"core"</text>
      <text x="62" y="132" fill="#94a3b8">: </text>
      <text x="74" y="132" fill="#86efac">"Java 21 + Spring Boot"</text>
      <text x="220" y="132" fill="#94a3b8">,</text>
      <text x="28" y="148" fill="#fbbf24">"events"</text>
      <text x="74" y="148" fill="#94a3b8">: </text>
      <text x="86" y="148" fill="#86efac">"Kafka"</text>
      <text x="138" y="148" fill="#94a3b8">,</text>
      <text x="28" y="164" fill="#fbbf24">"iam"</text>
      <text x="58" y="164" fill="#94a3b8">: </text>
      <text x="70" y="164" fill="#86efac">"Keycloak/OAuth2"</text>
      <text x="14" y="180" fill="#94a3b8">}</text>
    </g>

    <!-- Blinking cursor -->
    <rect x="14" y="194" width="7" height="12" fill="#00b4d8">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Left side: name + role -->
  <g transform="translate(60, 90)">
    <text font-family="'Segoe UI', system-ui, sans-serif" font-size="46" font-weight="700" fill="url(#accent)" filter="url(#glow)">
      Dhruv Kumar
    </text>
    <text y="34" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="500" fill="#94a3b8">
      Java Backend Engineer · Fintech · AI Integrations
    </text>

    <!-- Tag pills -->
    <g transform="translate(0, 60)">
      <g>
        <rect width="92" height="26" rx="13" fill="#0d1117" stroke="#00b4d8" stroke-width="1"/>
        <text x="46" y="17" font-family="monospace" font-size="11" fill="#00b4d8" text-anchor="middle">microservices</text>
      </g>
      <g transform="translate(102, 0)">
        <rect width="70" height="26" rx="13" fill="#0d1117" stroke="#7c3aed" stroke-width="1"/>
        <text x="35" y="17" font-family="monospace" font-size="11" fill="#a78bfa" text-anchor="middle">kafka</text>
      </g>
      <g transform="translate(182, 0)">
        <rect width="80" height="26" rx="13" fill="#0d1117" stroke="#22d3ee" stroke-width="1"/>
        <text x="40" y="17" font-family="monospace" font-size="11" fill="#22d3ee" text-anchor="middle">keycloak</text>
      </g>
      <g transform="translate(272, 0)">
        <rect width="80" height="26" rx="13" fill="#0d1117" stroke="#fbbf24" stroke-width="1"/>
        <text x="40" y="17" font-family="monospace" font-size="11" fill="#fbbf24" text-anchor="middle">spring AI</text>
      </g>
    </g>

    <!-- Location -->
    <g transform="translate(0, 105)">
      <circle cx="6" cy="6" r="4" fill="#22c55e">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="18" y="10" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#64748b">
        Hyderabad, India  ·  Open to remote roles globally
      </text>
    </g>
  </g>
</svg>
